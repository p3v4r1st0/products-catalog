<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos em Promoção</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; background: #f5f5f5; color: #1a1a1a; line-height: 1.6; }
        .products-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .hero-banner { width: 100%; min-height: 300px; background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%), url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1200&h=400&fit=crop'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; margin-bottom: 60px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .hero-title { font-size: 3.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin: 0; padding: 20px 40px; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .products-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-bottom: 60px; }
        .product-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.08); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; border: 1px solid #eee; height: 100%; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .product-image { width: 100%; height: 200px; overflow: hidden; background: #f8f9fa; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .product-card:hover .product-image img { transform: scale(1.05); }
        .product-title { font-size: 1.1rem; font-weight: 700; margin: 0; padding: 16px 16px 8px 16px; color: #1a1a1a; line-height: 1.3; min-height: 60px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 1.5rem; font-weight: 800; color: #00a651; margin: 0 0 16px 16px; }
        .product-rating { font-size: 0.9rem; color: #f5a623; margin: 0 0 12px 16px; }
        .product-btn { display: inline-block; background: linear-gradient(135deg, #0073aa 0%, #005a87 100%); color: #fff !important; text-decoration: none; padding: 12px 24px; margin: 0 16px 16px 16px; border-radius: 8px; font-weight: 600; text-align: center; transition: background 0.2s ease; border: none; cursor: pointer; align-self: flex-start; }
        .product-btn:hover { background: linear-gradient(135deg, #005a87 0%, #004470 100%); color: #fff !important; }
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        @media (max-width: 768px) { .hero-title { font-size: 2.2rem; padding: 15px 20px; } .products-grid { grid-template-columns: 1fr; gap: 20px; } }
    </style>
</head>
<body>
    <div class="products-container">
        <div class="hero-banner"><h1 class="hero-title">Produtos em Promoções</h1></div>
        <div class="products-grid">
            <!-- Produtos serão inseridos aqui dinamicamente -->
        </div>
    </div>
</body>
</html>
