    <style>
    /* Reset & Base */
    .products-container * { box-sizing: border-box; margin: 0; padding: 0; }
    .products-container {
        max-width: 1400px; margin: 0 auto; padding: 0 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        background: #f5f5f5; color: #1a1a1a; line-height: 1.6;
    }
    body { margin: 0 !important; padding: 0 !important; }
    /* Hero Banner */
    .hero-banner {
        position: relative; width: 100%; min-height: 320px;
        background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.45) 100%),
                    url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&h=500&fit=crop');
        background-size: cover; background-position: center;
        display: flex; align-items: center; justify-content: center; text-align: center;
        color: #fff; margin-bottom: 80px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .hero-title {
        font-size: 3.8rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
        margin: 0; padding: 30px 50px; text-shadow: 2px 4px 12px rgba(0,0,0,0.5);
    }
    .hero-subtitle {
        font-size: 1.3rem; font-weight: 400; opacity: 0.95; margin-top: 15px;
        padding: 0 20px; max-width: 700px;
    }
    /* Products Grid */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px; margin-bottom: 80px;
    }
    /* Product Card */
    .product-card {
        background: #fff; border-radius: 16px; overflow: hidden;
        box-shadow: 0 6px 20px rgba(0,0,0,0.08); transition: all 0.3s ease;
        display: flex; flex-direction: column; border: 1px solid #eee;
    }
    .product-card:hover {
        transform: translateY(-8px); box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .product-image {
        width: 100%; height: 220px; overflow: hidden;
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        display: flex; align-items: center; justify-content: center;
    }
    .product-image img {
        width: 100%; height: 100%; object-fit: cover;
        transition: transform 0.5s ease;
    }
    .product-card:hover .product-image img { transform: scale(1.08); }
    .product-title {
        font-size: 1.05rem; font-weight: 700; margin: 0; padding: 18px 18px 10px 18px;
        color: #1a1a1a; line-height: 1.35; min-height: 65px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-price {
        font-size: 1.6rem; font-weight: 800; color: #00a651;
        margin: 0 0 6px 18px;
    }
    .product-price::before { content: 'R$'; font-size: 1.1rem; opacity: 0.7; margin-right: 2px; }
    .product-rating {
        font-size: 0.85rem; color: #f5a623; margin: 0 0 16px 18px;
    }
    .product-rating::before { content: '⭐'; font-size: 0.9rem; margin-right: 4px; }
    .product-btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        background: linear-gradient(135deg, #0073aa 0%, #005a87 100%);
        color: #fff !important; text-decoration: none;
        padding: 14px 24px; margin: auto 18px 18px 18px;
        border-radius: 8px; font-weight: 600; font-size: 0.95rem;
        transition: all 0.3s ease; border: none; cursor: pointer;
    }
    .product-btn:hover {
        background: linear-gradient(135deg, #005a87 0%, #004470 100%);
        transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,123,255,0.35);
    }
    /* Responsive */
    @media (max-width: 768px) {
        .hero-title { font-size: 2.2rem; padding: 20px 25px; letter-spacing: 2px; }
        .hero-banner { min-height: 240px; margin-bottom: 50px; border-radius: 16px; }
        .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    }
    @media (max-width: 480px) {
        .products-grid { grid-template-columns: 1fr; }
        .hero-title { font-size: 1.8rem; padding: 15px; }
    }
    </style>
